<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reservas - Taxi Transfers Tenerife</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <!--
      manage-booking.html
      Página para gestión de reservas existentes.
      Comentarios añadidos para explicar la estructura, accesibilidad y lógica de cada sección.
    -->

    <!-- Encabezado de gestión de reservas -->
    <!-- Navigation -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary" aria-label="Navegación principal">
            <div class="container">
                <a class="navbar-brand" href="index.html">Taxi Transfer TFS</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Abrir menú de navegación">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="booking.html">Reservar</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="manage-booking.html">Mis Reservas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="contact.html">Contacto</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main id="main-content" tabindex="-1">
        <section class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card shadow-sm">
                        <div class="card-body p-5">
                            <h1 class="card-title h3 mb-4 text-center">Mis Reservas</h1>
                            <p class="card-text text-center mb-4">Introduce tu código de reserva y correo electrónico para consultar o gestionar tu viaje.</p>
                            
                            <form action="#" method="POST" id="manage-form" novalidate aria-label="Formulario para buscar reserva existente">
                                <div class="mb-4">
                                    <label for="codigo_reserva" class="form-label fw-semibold">Código de Reserva <span class="text-danger" aria-hidden="true">*</span></label>
                                    <input type="text" class="form-control form-control-lg" id="codigo_reserva" name="codigo_reserva" placeholder="Ej. TX-12345" required aria-required="true">
                                </div>
                                
                                <div class="mb-4">
                                    <label for="email_reserva" class="form-label fw-semibold">Correo Electrónico <span class="text-danger" aria-hidden="true">*</span></label>
                                    <input type="email" class="form-control form-control-lg" id="email_reserva" name="email_reserva" placeholder="correo@ejemplo.com" required aria-required="true">
                                </div>
                                
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary btn-lg">Buscar Reserva</button>
                                </div>
                            </form>
                            
                            <!-- Contenedor para mostrar resultados accesibles dinámicamente -->
                            <div id="resultado-reserva" class="mt-4" aria-live="polite" aria-atomic="true"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 Taxi Transfer TFS. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
    <!--
      Formulario de consulta de reserva:
      - Permite buscar y modificar reservas mediante código y email.
      - Campos accesibles y feedback para errores.
      - Roles y atributos aria para accesibilidad.
    -->
</body>
</html>
